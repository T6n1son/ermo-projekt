<!DOCTYPE html>
<html>

<head>
    <title>Flask Messages</title>
</head>
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f0f0f0;
    }

    .container {
        width: 500px;
        margin: 40px auto;
        background: white;
        padding: 20px;
        border: 1px solid #ccc;
    }

    h1 {
        text-align: center;
    }

    form {
        margin-bottom: 15px;
    }

    input {
        width: 70%;
        padding: 8px;
        border: 1px solid #ccc;
    }

    button {
        padding: 8px 12px;
    }

    .msg {
        border-bottom: 1px solid #ddd;
        padding: 5px 0;
    }
</style>


<body>
    <div class="container">

        <h1>Message App</h1>

        <form method="post">
            <input type="text" name="message" placeholder="Enter message">
            <button type="submit">Send</button>
        </form>

        <div class="messages">
            {% for m in messages %}
            <div class="msg">{{ m }}</div>
            {% endfor %}
        </div>

    </div>
</body>

</html>
